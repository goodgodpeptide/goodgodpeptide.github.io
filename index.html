<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>💉 펩타이드 매니저</title>
  <meta name="theme-color" content="#0a0a14" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCD_MHtrTqcw-TgaCL86B5ytnhXsbmLqHc",
      authDomain: "goodgodpeptide.firebaseapp.com",
      projectId: "goodgodpeptide",
      storageBucket: "goodgodpeptide.firebasestorage.app",
      messagingSenderId: "249729861869",
      appId: "1:249729861869:web:5acf9d1de7d33999fea4e4",
      measurementId: "G-BBW8658LPG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let saveTimer = null;
    let appData = {
      records: [],
      weightRecords: [],
      gender: "남성",
      height: "",
      targetWeight: ""
    };

    // ── Auth State ─────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-screen").style.display = "flex";
        document.getElementById("user-name").textContent = user.displayName || user.email;
        document.getElementById("user-avatar").src = user.photoURL || "";
        await loadData();
        renderAll();
      } else {
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("app-screen").style.display = "none";
      }
    });

    window.doLogin = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch(e) { console.error(e); }
    };

    window.doLogout = async () => {
      await signOut(auth);
    };

    // ── Firestore ──────────────────────────────────────
    async function loadData() {
      if (!currentUser) return;
      setSaveStatus("loading");
      try {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.exists()) {
          appData = { ...appData, ...snap.data() };
        }
        setSaveStatus("saved");
      } catch(e) {
        setSaveStatus("error");
      }
    }

    async function saveData() {
      if (!currentUser) return;
      setSaveStatus("saving");
      try {
        await setDoc(doc(db, "users", currentUser.uid), appData);
        setSaveStatus("saved");
      } catch(e) {
        setSaveStatus("error");
      }
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveData, 800);
    }

    function setSaveStatus(status) {
      const el = document.getElementById("save-status");
      if (!el) return;
      const map = {
        saved:   { text: "☁️ 저장됨",    bg: "#0f2a1a", color: "#4ade80", border: "#166534" },
        saving:  { text: "⏳ 저장중...", bg: "#2a200a", color: "#facc15", border: "#713f12" },
        error:   { text: "❌ 오류",      bg: "#2a0a0a", color: "#f87171", border: "#7f1d1d" },
        loading: { text: "🔄 불러오는 중", bg: "#0a1a2a", color: "#60a5fa", border: "#1e3a5f" },
      };
      const s = map[status] || map.saved;
      el.textContent = s.text;
      el.style.background = s.bg;
      el.style.color = s.color;
      el.style.borderColor = s.border;
    }

    // ── App Logic ──────────────────────────────────────
    const DRUG_CONFIG = {
      "터제파타이드": { halfLife: 5,  color: "#60a5fa", emoji: "🔵", short: "터제" },
      "레타트루타이드": { halfLife: 6, color: "#f87171", emoji: "🔴", short: "레타" },
      "세마글루타이드": { halfLife: 7, color: "#4ade80", emoji: "🟢", short: "세마" },
    };

    function calcRemaining(drug) {
      const cfg = DRUG_CONFIG[drug];
      const now = Date.now();
      let rem = 0;
      (appData.records || []).filter(r => r.drug === drug).forEach(r => {
        const hrs = (now - r.time) / 3600000;
        rem += r.dose * Math.pow(0.5, hrs / (cfg.halfLife * 24));
      });
      return rem;
    }

    // ── Add Peptide Record ─────────────────────────────
    window.submitAddRecord = () => {
      const drug = document.getElementById("add-drug").value;
      const dose = parseFloat(document.getElementById("add-dose").value);
      const timeVal = document.getElementById("add-time").value;
      if (!dose || !timeVal) return;
      appData.records = appData.records || [];
      appData.records.push({ id: Date.now(), drug, dose, time: new Date(timeVal).getTime() });
      scheduleSave();
      document.getElementById("add-modal").style.display = "none";
      renderAll();
    };

    window.deleteRecord = (id) => {
      appData.records = (appData.records || []).filter(r => r.id !== id);
      scheduleSave();
      renderAll();
    };

    // ── Add Weight Record ──────────────────────────────
    window.submitAddWeight = () => {
      const weight = parseFloat(document.getElementById("add-weight").value);
      const timeVal = document.getElementById("add-weight-time").value;
      if (!weight || !timeVal) return;
      appData.weightRecords = appData.weightRecords || [];
      appData.weightRecords.push({ id: Date.now(), weight, time: new Date(timeVal).getTime() });
      scheduleSave();
      document.getElementById("weight-modal").style.display = "none";
      renderAll();
    };

    window.deleteWeightRecord = (id) => {
      appData.weightRecords = (appData.weightRecords || []).filter(r => r.id !== id);
      scheduleSave();
      renderAll();
    };

    window.saveSettings = () => {
      appData.gender = document.getElementById("s-gender").value;
      appData.height = document.getElementById("s-height").value;
      appData.targetWeight = document.getElementById("s-target").value;
      scheduleSave();
      renderAll();
    };

    // ── Render ─────────────────────────────────────────
    function renderAll() {
      renderRemainingCards();
      renderPeptideList();
      renderPeptideGraph();
      renderWeightStats();
      renderWeightList();
      renderWeightGraph();
    }

    function renderRemainingCards() {
      const container = document.getElementById("remaining-cards");
      if (!container) return;
      container.innerHTML = Object.entries(DRUG_CONFIG).map(([drug, cfg]) => {
        const rem = calcRemaining(drug);
        return `
          <div class="card" style="border-color:${cfg.color}22">
            <div style="font-size:12px;color:#9ca3af;margin-bottom:4px">${cfg.emoji} ${drug}</div>
            <div style="font-size:24px;font-weight:700;color:${cfg.color};font-family:'JetBrains Mono',monospace">${rem.toFixed(3)}<span style="font-size:13px;font-weight:400;margin-left:4px">mg</span></div>
            <div style="font-size:11px;color:#4a5568;margin-top:4px">반감기 ${cfg.halfLife}일</div>
          </div>`;
      }).join("");
    }

    function renderPeptideList() {
      const filter = document.getElementById("peptide-filter")?.value || "전체";
      const container = document.getElementById("peptide-list");
      if (!container) return;
      let recs = (appData.records || []).filter(r => {
        if (filter === "전체") return true;
        return DRUG_CONFIG[r.drug]?.short === filter;
      }).sort((a,b) => b.time - a.time);

      if (!recs.length) {
        container.innerHTML = `<div style="text-align:center;color:#4a5568;padding:32px 0;font-size:14px">기록이 없습니다</div>`;
        return;
      }
      container.innerHTML = recs.map(r => {
        const cfg = DRUG_CONFIG[r.drug] || {};
        const d = new Date(r.time).toLocaleString("ko-KR");
        return `
          <div class="record-row" style="border-color:${cfg.color}22">
            <div>
              <div style="font-size:12px;color:${cfg.color};margin-bottom:3px">${cfg.emoji||""} ${r.drug}</div>
              <div style="font-size:17px;font-weight:700;color:#e2e8f0;font-family:'JetBrains Mono',monospace">${r.dose} mg</div>
              <div style="font-size:11px;color:#4a5568;margin-top:2px">${d}</div>
            </div>
            <button class="del-btn" onclick="deleteRecord(${r.id})">삭제</button>
          </div>`;
      }).join("");
    }

    // ── Peptide Graph (체내 농도) ──────────────────────
    function renderPeptideGraph() {
      const canvas = document.getElementById("peptide-chart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const W = canvas.width = canvas.offsetWidth;
      const H = canvas.height = 220;
      ctx.clearRect(0, 0, W, H);

      const records = appData.records || [];
      if (!records.length) {
        ctx.fillStyle = "#4a5568";
        ctx.font = "14px 'Noto Sans KR'";
        ctx.textAlign = "center";
        ctx.fillText("기록이 없습니다", W/2, H/2);
        return;
      }

      // time range: oldest record - 4 weeks from now
      const now = Date.now();
      const minTime = Math.min(...records.map(r => r.time)) - 86400000;
      const maxTime = now + 7 * 86400000;
      const totalMs = maxTime - minTime;

      // compute concentration curve for each drug
      const PAD = { l: 45, r: 15, t: 15, b: 35 };
      const gW = W - PAD.l - PAD.r;
      const gH = H - PAD.t - PAD.b;

      const STEPS = 200;
      let globalMax = 0;

      const curves = Object.entries(DRUG_CONFIG).map(([drug, cfg]) => {
        const drugRecs = records.filter(r => r.drug === drug);
        if (!drugRecs.length) return null;
        const points = [];
        for (let i = 0; i <= STEPS; i++) {
          const t = minTime + (i / STEPS) * totalMs;
          let val = 0;
          drugRecs.forEach(r => {
            const hrs = (t - r.time) / 3600000;
            if (hrs >= 0) val += r.dose * Math.pow(0.5, hrs / (cfg.halfLife * 24));
          });
          points.push({ t, val });
          if (val > globalMax) globalMax = val;
        }
        return { drug, cfg, points };
      }).filter(Boolean);

      if (globalMax === 0) return;

      // grid lines
      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = PAD.t + gH - (i / 4) * gH;
        ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + gW, y); ctx.stroke();
        ctx.fillStyle = "#4a5568";
        ctx.font = "10px 'JetBrains Mono'";
        ctx.textAlign = "right";
        ctx.fillText((globalMax * i / 4).toFixed(2), PAD.l - 4, y + 4);
      }

      // x axis labels (weeks)
      ctx.fillStyle = "#4a5568";
      ctx.font = "10px 'Noto Sans KR'";
      ctx.textAlign = "center";
      for (let i = 0; i <= 4; i++) {
        const t = minTime + (i / 4) * totalMs;
        const x = PAD.l + (i / 4) * gW;
        const d = new Date(t);
        ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, x, H - 5);
      }

      // draw curves
      curves.forEach(({ cfg, points }) => {
        ctx.beginPath();
        ctx.strokeStyle = cfg.color;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = cfg.color;
        ctx.shadowBlur = 8;
        points.forEach((p, i) => {
          const x = PAD.l + ((p.t - minTime) / totalMs) * gW;
          const y = PAD.t + gH - (p.val / globalMax) * gH;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;

        // fill under curve
        const lastP = points[points.length - 1];
        const lastX = PAD.l + ((lastP.t - minTime) / totalMs) * gW;
        ctx.lineTo(lastX, PAD.t + gH);
        ctx.lineTo(PAD.l, PAD.t + gH);
        ctx.closePath();
        ctx.fillStyle = cfg.color + "18";
        ctx.fill();
      });

      // "now" line
      const nowX = PAD.l + ((now - minTime) / totalMs) * gW;
      ctx.strokeStyle = "#ffffff44";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(nowX, PAD.t); ctx.lineTo(nowX, PAD.t + gH); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#ffffff66";
      ctx.font = "10px 'Noto Sans KR'";
      ctx.textAlign = "center";
      ctx.fillText("현재", nowX, PAD.t + 10);

      // legend
      let lx = PAD.l;
      curves.forEach(({ drug, cfg }) => {
        ctx.fillStyle = cfg.color;
        ctx.fillRect(lx, PAD.t, 12, 3);
        ctx.fillStyle = "#9ca3af";
        ctx.font = "10px 'Noto Sans KR'";
        ctx.textAlign = "left";
        ctx.fillText(cfg.short, lx + 16, PAD.t + 4);
        lx += 60;
      });
    }

    // ── Weight Graph ───────────────────────────────────
    function renderWeightGraph() {
      const canvas = document.getElementById("weight-chart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const W = canvas.width = canvas.offsetWidth;
      const H = canvas.height = 200;
      ctx.clearRect(0, 0, W, H);

      const recs = (appData.weightRecords || []).sort((a, b) => a.time - b.time);
      if (recs.length < 2) {
        ctx.fillStyle = "#4a5568";
        ctx.font = "14px 'Noto Sans KR'";
        ctx.textAlign = "center";
        ctx.fillText(recs.length === 0 ? "기록이 없습니다" : "2개 이상 기록 필요", W/2, H/2);
        return;
      }

      const PAD = { l: 45, r: 15, t: 20, b: 35 };
      const gW = W - PAD.l - PAD.r;
      const gH = H - PAD.t - PAD.b;

      const minT = recs[0].time, maxT = recs[recs.length-1].time;
      const weights = recs.map(r => r.weight);
      const minW = Math.min(...weights) - 1;
      const maxW = Math.max(...weights) + 1;
      const rangeW = maxW - minW || 1;
      const rangeT = maxT - minT || 1;

      // grid
      ctx.strokeStyle = "#1f2937"; ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = PAD.t + (i / 4) * gH;
        ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + gW, y); ctx.stroke();
        ctx.fillStyle = "#4a5568";
        ctx.font = "10px 'JetBrains Mono'";
        ctx.textAlign = "right";
        ctx.fillText((maxW - (i / 4) * rangeW).toFixed(1), PAD.l - 4, y + 4);
      }

      // x labels
      ctx.fillStyle = "#4a5568"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "center";
      [0, 0.25, 0.5, 0.75, 1].forEach(f => {
        const t = minT + f * rangeT;
        const x = PAD.l + f * gW;
        const d = new Date(t);
        ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, x, H - 5);
      });

      // target line
      if (appData.targetWeight) {
        const tw = parseFloat(appData.targetWeight);
        const ty = PAD.t + gH - ((tw - minW) / rangeW) * gH;
        if (ty >= PAD.t && ty <= PAD.t + gH) {
          ctx.strokeStyle = "#facc1566"; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(PAD.l, ty); ctx.lineTo(PAD.l + gW, ty); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#facc15"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "left";
          ctx.fillText(`목표 ${tw}kg`, PAD.l + 4, ty - 4);
        }
      }

      // gradient fill
      const grad = ctx.createLinearGradient(0, PAD.t, 0, PAD.t + gH);
      grad.addColorStop(0, "#4ade8044");
      grad.addColorStop(1, "#4ade8000");
      ctx.beginPath();
      recs.forEach((r, i) => {
        const x = PAD.l + ((r.time - minT) / rangeT) * gW;
        const y = PAD.t + gH - ((r.weight - minW) / rangeW) * gH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      const lastX = PAD.l + gW;
      const firstX = PAD.l;
      ctx.lineTo(lastX, PAD.t + gH);
      ctx.lineTo(firstX, PAD.t + gH);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // line
      ctx.beginPath(); ctx.strokeStyle = "#4ade80"; ctx.lineWidth = 2.5;
      ctx.shadowColor = "#4ade80"; ctx.shadowBlur = 8;
      recs.forEach((r, i) => {
        const x = PAD.l + ((r.time - minT) / rangeT) * gW;
        const y = PAD.t + gH - ((r.weight - minW) / rangeW) * gH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke(); ctx.shadowBlur = 0;

      // dots
      recs.forEach(r => {
        const x = PAD.l + ((r.time - minT) / rangeT) * gW;
        const y = PAD.t + gH - ((r.weight - minW) / rangeW) * gH;
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#4ade80"; ctx.fill();
        ctx.strokeStyle = "#0a0a14"; ctx.lineWidth = 2; ctx.stroke();
      });
    }

    function renderWeightStats() {
      const recs = (appData.weightRecords || []).sort((a, b) => b.time - a.time);
      const latest = recs[0];
      const h = parseFloat(appData.height) || 0;
      const target = parseFloat(appData.targetWeight) || 0;

      const el = id => document.getElementById(id);
      if (!el("stat-weight")) return;

      if (latest) {
        el("stat-weight").textContent = latest.weight + " kg";
        if (h) {
          const bmi = latest.weight / Math.pow(h/100, 2);
          const bmiLabels = [[18.5,"저체중","#60a5fa"],[23,"정상","#4ade80"],[25,"과체중","#facc15"],[30,"비만","#f97316"],[999,"고도비만","#ef4444"]];
          const [,label,color] = bmiLabels.find(([v]) => bmi < v) || bmiLabels[4];
          el("stat-bmi").textContent = bmi.toFixed(1) + " " + label;
          el("stat-bmi").style.color = color;
        }
        if (target) {
          const diff = latest.weight - target;
          el("stat-target").textContent = diff <= 0 ? "🎉 목표 달성!" : `${diff.toFixed(1)} kg 남음`;
          el("stat-target").style.color = diff <= 0 ? "#4ade80" : "#facc15";
        }
      } else {
        el("stat-weight").textContent = "-- kg";
        el("stat-bmi").textContent = "--";
        el("stat-target").textContent = "--";
      }

      // settings
      if (appData.gender) {
        document.querySelectorAll(".gender-btn").forEach(b => {
          b.classList.toggle("active", b.dataset.v === appData.gender);
        });
      }
      if (el("s-height")) el("s-height").value = appData.height || "";
      if (el("s-target")) el("s-target").value = appData.targetWeight || "";
    }

    function renderWeightList() {
      const container = document.getElementById("weight-list");
      if (!container) return;
      const recs = (appData.weightRecords || []).sort((a,b) => b.time - a.time);
      if (!recs.length) {
        container.innerHTML = `<div style="text-align:center;color:#4a5568;padding:32px 0;font-size:14px">기록이 없습니다</div>`;
        return;
      }
      container.innerHTML = recs.map(r => `
        <div class="record-row" style="border-color:#4ade8022">
          <div>
            <div style="font-size:20px;font-weight:700;color:#4ade80;font-family:'JetBrains Mono',monospace">${r.weight} kg</div>
            <div style="font-size:11px;color:#4a5568;margin-top:2px">${new Date(r.time).toLocaleString("ko-KR")}</div>
          </div>
          <button class="del-btn" onclick="deleteWeightRecord(${r.id})">삭제</button>
        </div>`).join("");
    }

    // Modal helpers
    window.openAddModal = () => {
      document.getElementById("add-time").value = new Date().toISOString().slice(0,16);
      document.getElementById("add-modal").style.display = "flex";
    };
    window.closeAddModal = () => document.getElementById("add-modal").style.display = "none";
    window.openWeightModal = () => {
      document.getElementById("add-weight-time").value = new Date().toISOString().slice(0,16);
      document.getElementById("weight-modal").style.display = "flex";
    };
    window.closeWeightModal = () => document.getElementById("weight-modal").style.display = "none";

    window.calcPeptide = () => {
      const vial = parseFloat(document.getElementById("c-vial").value);
      const water = parseFloat(document.getElementById("c-water").value);
      const dose = parseFloat(document.getElementById("c-dose").value);
      if (!vial||!water||!dose) return;
      const conc = (vial * 1000) / water;
      const volume = dose / conc;
      const units = volume * 100;
      const injPerVial = (vial * 1000) / dose;
      document.getElementById("calc-result").innerHTML = `
        <div class="result-card">
          <div class="result-row"><span>농도</span><span>${conc.toFixed(0)} mcg/ml</span></div>
          <div class="result-row"><span>1회 투여량</span><span>${(volume*1000).toFixed(0)} μL</span></div>
          <div class="result-row"><span>인슐린 단위</span><span>${units.toFixed(1)} U</span></div>
          <div class="result-row"><span>바이알당 횟수</span><span>${injPerVial.toFixed(0)}회</span></div>
        </div>`;
    };

    // Tab switching
    window.switchTab = (tab) => {
      document.querySelectorAll(".tab-panel").forEach(p => p.style.display = "none");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("panel-" + tab).style.display = "block";
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
      if (tab === "peptide" || tab === "weight") setTimeout(() => { renderPeptideGraph(); renderWeightGraph(); }, 50);
    };

    window.setGender = (g) => {
      appData.gender = g;
      document.querySelectorAll(".gender-btn").forEach(b => b.classList.toggle("active", b.dataset.v === g));
    };

    window.setQuickVal = (field, val) => {
      const el = document.getElementById(field);
      if (el) { el.value = val; el.dispatchEvent(new Event("input")); }
    };

    window.addEventListener("resize", () => { renderPeptideGraph(); renderWeightGraph(); });

    // expose for filter change
    window.onFilterChange = renderPeptideList;
    window.saveSettings = () => {
      appData.gender = document.getElementById("s-gender") ? document.getElementById("s-gender").value : appData.gender;
      appData.height = document.getElementById("s-height").value;
      appData.targetWeight = document.getElementById("s-target").value;
      scheduleSave();
      renderAll();
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a14; color: #e2e8f0; font-family: 'Noto Sans KR', sans-serif; }

    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px 20px; text-align: center;
      background: radial-gradient(ellipse at 50% 20%, #1a1a3e 0%, #0a0a14 70%);
    }
    .login-logo { font-size: 56px; margin-bottom: 16px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .login-title { font-size: 26px; font-weight: 900; color: #e2e8f0; letter-spacing: -1px; margin-bottom: 8px; }
    .login-sub { font-size: 14px; color: #6b7280; margin-bottom: 48px; }
    .login-btn {
      display: flex; align-items: center; gap: 12px; padding: 14px 28px;
      background: #fff; border: none; border-radius: 12px; cursor: pointer;
      font-size: 15px; font-weight: 700; color: #1f2937; font-family: inherit;
      box-shadow: 0 4px 24px #00000066; transition: transform .15s;
    }
    .login-btn:hover { transform: scale(1.04); }
    .google-icon { width: 22px; height: 22px; }

    #app-screen { display: none; flex-direction: column; min-height: 100vh; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: #0f0f1e;
      border-bottom: 1px solid #1f2937; position: sticky; top: 0; z-index: 10;
    }
    .top-bar-left { display: flex; flex-direction: column; }
    .top-bar-title { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
    .top-bar-right { display: flex; align-items: center; gap: 8px; }
    #user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #374151; }
    #user-name { font-size: 12px; color: #9ca3af; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #save-status { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid; transition: all .3s; }
    .logout-btn { background: none; border: 1px solid #374151; border-radius: 8px; color: #6b7280; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit; }

    .tabs { display: flex; background: #0d0d1a; border-bottom: 1px solid #1f2937; }
    .tab-btn {
      flex: 1; padding: 12px 6px; font-size: 13px; font-weight: 500;
      background: none; border: none; cursor: pointer; color: #6b7280;
      border-bottom: 2px solid transparent; transition: all .2s; font-family: inherit;
    }
    .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }

    .content { flex: 1; padding: 16px; max-width: 520px; margin: 0 auto; width: 100%; }
    .tab-panel { display: none; }
    .tab-panel:first-of-type { display: block; }

    .card {
      background: #12121e; border: 1px solid #1f2937; border-radius: 14px;
      padding: 14px 16px; transition: border-color .2s;
    }
    .section-title { font-size: 13px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .big-btn {
      width: 100%; padding: 13px; border: none; border-radius: 12px;
      color: white; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity .15s;
    }
    .big-btn:hover { opacity: .9; }
    .big-btn.blue { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
    .big-btn.green { background: linear-gradient(135deg, #065f46, #059669); }

    .record-row {
      background: #0d0d1a; border: 1px solid #1f2937; border-radius: 12px;
      padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .del-btn {
      background: #7f1d1d; border: none; border-radius: 8px;
      color: #fca5a5; padding: 6px 12px; cursor: pointer; font-size: 12px; font-family: inherit;
    }

    .filter-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px; background: #1f2937; border: none; border-radius: 20px;
      color: #6b7280; font-size: 12px; cursor: pointer; font-family: inherit;
      transition: all .15s;
    }
    .filter-btn.active { background: #1d4ed8; color: white; }

    .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .qbtn {
      padding: 5px 12px; background: #1f2937; border: none; border-radius: 8px;
      color: #9ca3af; font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .qbtn:hover, .qbtn.active { background: #1d4ed8; color: white; }

    .input-field {
      width: 100%; padding: 10px 12px; background: #0d0d1a;
      border: 1px solid #374151; border-radius: 10px; color: #e2e8f0;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s;
    }
    .input-field:focus { border-color: #3b82f6; }
    label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 6px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: #00000088;
      z-index: 100; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: #12121e; border: 1px solid #2d3748; border-radius: 16px;
      padding: 20px; width: 100%; max-width: 380px;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #e2e8f0; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

    .result-card { background: #0d1b2a; border: 1px solid #1d4ed8; border-radius: 12px; padding: 14px; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1f2937; font-size: 13px; }
    .result-row:last-child { border-bottom: none; }
    .result-row span:first-child { color: #9ca3af; }
    .result-row span:last-child { color: #e2e8f0; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #12121e; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; }
    .stat-label { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
    .stat-val { font-size: 20px; font-weight: 700; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }

    .gender-btn {
      flex: 1; padding: 8px; background: #1f2937; border: none; border-radius: 8px;
      color: #6b7280; cursor: pointer; font-family: inherit; font-size: 14px; transition: all .15s;
    }
    .gender-btn.active { background: #1d4ed8; color: white; }

    canvas { display: block; width: 100%; }

    .chart-wrap {
      background: #0d0d1a; border: 1px solid #1f2937; border-radius: 14px;
      padding: 12px; margin-bottom: 16px;
    }
    .chart-title { font-size: 12px; color: #6b7280; margin-bottom: 8px; }

    @media (max-width: 380px) {
      .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div id="login-screen">
  <div class="login-logo">💉</div>
  <div class="login-title">펩타이드 매니저</div>
  <div class="login-sub">클라우드 동기화 · 어디서든 접속</div>
  <button class="login-btn" onclick="doLogin()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google로 시작하기
  </button>
</div>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="app-screen">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-title">💉 펩타이드 매니저</div>
    </div>
    <div class="top-bar-right">
      <div id="save-status">☁️ 저장됨</div>
      <img id="user-avatar" src="" alt="" />
      <span id="user-name"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="peptide" onclick="switchTab('peptide')">💉 펩타이드</button>
    <button class="tab-btn" data-tab="calc"    onclick="switchTab('calc')">🧮 계산기</button>
    <button class="tab-btn" data-tab="weight"  onclick="switchTab('weight')">⚖️ 체중</button>
  </div>

  <div class="content">

    <!-- ── PEPTIDE PANEL ── -->
    <div id="panel-peptide" class="tab-panel" style="display:block">
      <div style="display:grid;gap:10px;margin-bottom:16px" id="remaining-cards"></div>

      <!-- 체내 농도 그래프 -->
      <div class="chart-wrap">
        <div class="chart-title">📈 체내 농도 변화 (시간별)</div>
        <canvas id="peptide-chart"></canvas>
      </div>

      <button class="big-btn blue" onclick="openAddModal()" style="margin-bottom:14px">+ 투약 기록 추가</button>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="this.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('peptide-filter').value='전체';onFilterChange()">전체</button>
        <button class="filter-btn" onclick="this.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('peptide-filter').value='터제';onFilterChange()">터제</button>
        <button class="filter-btn" onclick="this.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('peptide-filter').value='레타';onFilterChange()">레타</button>
        <button class="filter-btn" onclick="this.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('peptide-filter').value='세마';onFilterChange()">세마</button>
        <input type="hidden" id="peptide-filter" value="전체" />
      </div>

      <div id="peptide-list"></div>
    </div>

    <!-- ── CALC PANEL ── -->
    <div id="panel-calc" class="tab-panel">
      <div class="card" style="margin-bottom:14px">
        <div class="section-title">바이알 용량 (mg)</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="setQuickVal('c-vial','10')">10</button>
          <button class="qbtn" onclick="setQuickVal('c-vial','30')">30</button>
          <button class="qbtn" onclick="setQuickVal('c-vial','60')">60</button>
        </div>
        <input id="c-vial" class="input-field" type="number" placeholder="직접 입력" />
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="section-title">BAC Water (ml)</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="setQuickVal('c-water','1.8')">1.8</button>
          <button class="qbtn" onclick="setQuickVal('c-water','2.4')">2.4</button>
          <button class="qbtn" onclick="setQuickVal('c-water','3.0')">3.0</button>
        </div>
        <input id="c-water" class="input-field" type="number" placeholder="직접 입력" />
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="section-title">1회 투여량 (mcg)</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="setQuickVal('c-dose','250')">250</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','500')">500</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','1000')">1000</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','2000')">2000</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','4000')">4000</button>
        </div>
        <input id="c-dose" class="input-field" type="number" placeholder="직접 입력" />
      </div>

      <button class="big-btn blue" onclick="calcPeptide()" style="margin-bottom:14px">계산하기</button>
      <div id="calc-result"></div>
    </div>

    <!-- ── WEIGHT PANEL ── -->
    <div id="panel-weight" class="tab-panel">

      <!-- 설정 -->
      <div class="card" style="margin-bottom:14px">
        <div class="section-title">기본 설정</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="gender-btn active" data-v="남성" onclick="setGender('남성')">남성</button>
          <button class="gender-btn" data-v="여성" onclick="setGender('여성')">여성</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div>
            <label>키 (cm)</label>
            <input id="s-height" class="input-field" type="number" placeholder="170" />
          </div>
          <div>
            <label>목표 체중 (kg)</label>
            <input id="s-target" class="input-field" type="number" placeholder="65" />
          </div>
        </div>
        <button class="big-btn green" onclick="saveSettings()">설정 저장</button>
      </div>

      <!-- 통계 -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">현재 체중</div>
          <div class="stat-val" id="stat-weight">-- kg</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">BMI</div>
          <div class="stat-val" id="stat-bmi">--</div>
        </div>
        <div class="stat-card" style="grid-column: 1 / -1">
          <div class="stat-label">목표까지</div>
          <div class="stat-val" id="stat-target">--</div>
        </div>
      </div>

      <!-- 체중 그래프 -->
      <div class="chart-wrap">
        <div class="chart-title">📉 체중 변화 추이</div>
        <canvas id="weight-chart"></canvas>
      </div>

      <button class="big-btn green" onclick="openWeightModal()" style="margin-bottom:14px">+ 체중 기록 추가</button>
      <div id="weight-list"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app-screen -->

<!-- ══ MODAL: 투약 추가 ══ -->
<div id="add-modal" class="modal-overlay" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-title">💉 투약 기록 추가</div>
    <div style="margin-bottom:12px">
      <label>약물</label>
      <select id="add-drug" class="input-field">
        <option>터제파타이드</option>
        <option>레타트루타이드</option>
        <option>세마글루타이드</option>
      </select>
    </div>
    <div style="margin-bottom:12px">
      <label>용량 (mg)</label>
      <input id="add-dose" class="input-field" type="number" step="0.1" placeholder="예: 2.5" />
    </div>
    <div style="margin-bottom:12px">
      <label>날짜 / 시간</label>
      <input id="add-time" class="input-field" type="datetime-local" />
    </div>
    <div class="modal-actions">
      <button class="big-btn" style="background:#374151;flex:1" onclick="closeAddModal()">취소</button>
      <button class="big-btn blue" style="flex:2" onclick="submitAddRecord()">저장</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: 체중 추가 ══ -->
<div id="weight-modal" class="modal-overlay" onclick="if(event.target===this)closeWeightModal()">
  <div class="modal-box">
    <div class="modal-title">⚖️ 체중 기록 추가</div>
    <div style="margin-bottom:12px">
      <label>체중 (kg)</label>
      <input id="add-weight" class="input-field" type="number" step="0.1" placeholder="예: 72.5" />
    </div>
    <div style="margin-bottom:12px">
      <label>날짜 / 시간</label>
      <input id="add-weight-time" class="input-field" type="datetime-local" />
    </div>
    <div class="modal-actions">
      <button class="big-btn" style="background:#374151;flex:1" onclick="closeWeightModal()">취소</button>
      <button class="big-btn green" style="flex:2" onclick="submitAddWeight()">저장</button>
    </div>
  </div>
</div>

</body>
</html>
