<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⚖️ 체중관리 매니저</title>
  <meta name="theme-color" content="#0a0a14" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCD_MHtrTqcw-TgaCL86B5ytnhXsbmLqHc",
      authDomain: "goodgodpeptide.firebaseapp.com",
      projectId: "goodgodpeptide",
      storageBucket: "goodgodpeptide.firebasestorage.app",
      messagingSenderId: "249729861869",
      appId: "1:249729861869:web:5acf9d1de7d33999fea4e4",
      measurementId: "G-BBW8658LPG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let saveTimer = null;
    let appData = { records: [], weightRecords: [], gender: "남성", height: "", targetWeight: "" };

    // ── 한국시간 헬퍼 ──────────────────────────────────
    function kstNow() {
      // 항상 한국시간(UTC+9) 기준으로 datetime-local 입력값 반환
      const now = new Date();
      const kstOffset = 9 * 60; // 분
      const localOffset = now.getTimezoneOffset(); // 분 (한국이면 -540)
      const kst = new Date(now.getTime() + (kstOffset + localOffset) * 60000);
      return kst.toISOString().slice(0, 16);
    }

    function toKSTString(ts) {
      return new Date(ts).toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
    }

    // ── Auth ───────────────────────────────────────────
    getRedirectResult(auth).catch(console.error);

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-screen").style.display = "flex";
        document.getElementById("user-name").textContent = user.displayName || user.email;
        document.getElementById("user-avatar").src = user.photoURL || "";
        await loadData();
        renderAll();
      } else {
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("app-screen").style.display = "none";
      }
    });

    window.doLogin = async () => {
      try { await signInWithPopup(auth, provider); }
      catch(e) { try { await signInWithRedirect(auth, provider); } catch(e2) { console.error(e2); } }
    };
    window.doLogout = async () => { await signOut(auth); };

    // ── Firestore ──────────────────────────────────────
    async function loadData() {
      setSaveStatus("loading");
      try {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.exists()) appData = { ...appData, ...snap.data() };
        setSaveStatus("saved");
      } catch(e) { setSaveStatus("error"); }
    }

    async function saveData() {
      if (!currentUser) return;
      setSaveStatus("saving");
      try {
        await setDoc(doc(db, "users", currentUser.uid), appData);
        setSaveStatus("saved");
      } catch(e) { setSaveStatus("error"); }
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveData, 800);
    }

    function setSaveStatus(s) {
      const el = document.getElementById("save-status");
      if (!el) return;
      const m = {
        saved:   ["☁️ 저장됨",    "#0f2a1a", "#4ade80", "#166534"],
        saving:  ["⏳ 저장중...", "#2a200a", "#facc15", "#713f12"],
        error:   ["❌ 오류",      "#2a0a0a", "#f87171", "#7f1d1d"],
        loading: ["🔄 로딩",      "#0a1a2a", "#60a5fa", "#1e3a5f"],
      };
      const [text, bg, color, border] = m[s] || m.saved;
      Object.assign(el.style, { background: bg, color, borderColor: border });
      el.textContent = text;
    }

    // ── 약물 설정 ──────────────────────────────────────
    // 반감기 계산식: C(t) = C0 × 0.5^(t / t½)
    // t½ = 반감기(시간), t = 경과시간(시간)
    const DRUG_CONFIG = {
      "터제파타이드":  { halfLifeDays: 5,  color: "#60a5fa", emoji: "🔵", short: "터제" },
      "레타트루타이드": { halfLifeDays: 6,  color: "#f87171", emoji: "🔴", short: "레타" },
      "세마글루타이드": { halfLifeDays: 7,  color: "#4ade80", emoji: "🟢", short: "세마" },
    };

    // 체내 농도 계산 (반감기 공식)
    function calcConcentrationAt(drug, targetTime) {
      const cfg = DRUG_CONFIG[drug];
      const halfLifeHrs = cfg.halfLifeDays * 24;
      let total = 0;
      (appData.records || []).filter(r => r.drug === drug && r.time <= targetTime).forEach(r => {
        const hrs = (targetTime - r.time) / 3600000;
        total += r.dose * Math.pow(0.5, hrs / halfLifeHrs);
      });
      return total;
    }

    function calcRemaining(drug) {
      return calcConcentrationAt(drug, Date.now());
    }

    // ── 투약 기록 추가 ─────────────────────────────────
    window.submitAddRecord = () => {
      const drug = document.getElementById("add-drug").value;
      const dose = parseFloat(document.getElementById("add-dose").value);
      const timeVal = document.getElementById("add-time").value;
      if (!dose || !timeVal) return;
      appData.records = appData.records || [];
      appData.records.push({ id: Date.now(), drug, dose, time: new Date(timeVal).getTime() });
      scheduleSave();
      document.getElementById("add-modal").style.display = "none";
      renderAll();
    };

    window.deleteRecord = (id) => {
      appData.records = (appData.records || []).filter(r => r.id !== id);
      scheduleSave(); renderAll();
    };

    // ── 수동 농도 입력 ─────────────────────────────────
    window.openOverrideModal = (drug) => {
      const cfg = DRUG_CONFIG[drug];
      document.getElementById("override-title").textContent = `${cfg.emoji} ${drug} 수동 입력`;
      document.getElementById("override-modal").dataset.drug = drug;
      document.getElementById("override-amount").value = calcRemaining(drug).toFixed(3);
      document.getElementById("override-time").value = kstNow();
      document.getElementById("override-modal").style.display = "flex";
    };

    window.submitOverride = () => {
      const drug = document.getElementById("override-modal").dataset.drug;
      const amount = parseFloat(document.getElementById("override-amount").value);
      const timeVal = document.getElementById("override-time").value;
      if (isNaN(amount) || !timeVal) return;
      appData.records = (appData.records || []).filter(r => r.drug !== drug);
      if (amount > 0) {
        appData.records.push({ id: Date.now(), drug, dose: amount, time: new Date(timeVal).getTime(), isOverride: true });
      }
      scheduleSave();
      document.getElementById("override-modal").style.display = "none";
      renderAll();
    };

    // ── 체중 기록 ──────────────────────────────────────
    window.submitAddWeight = () => {
      const weight = parseFloat(document.getElementById("add-weight").value);
      const timeVal = document.getElementById("add-weight-time").value;
      if (!weight || !timeVal) return;
      appData.weightRecords = appData.weightRecords || [];
      appData.weightRecords.push({ id: Date.now(), weight, time: new Date(timeVal).getTime() });
      scheduleSave();
      document.getElementById("weight-modal").style.display = "none";
      renderAll();
    };

    window.deleteWeightRecord = (id) => {
      appData.weightRecords = (appData.weightRecords || []).filter(r => r.id !== id);
      scheduleSave(); renderAll();
    };

    window.saveSettings = () => {
      appData.gender = document.querySelectorAll(".gender-btn.active")[0]?.dataset.v || appData.gender;
      appData.height = document.getElementById("s-height").value;
      appData.targetWeight = document.getElementById("s-target").value;
      scheduleSave(); renderAll();
    };

    // ── 그래프 상태 ────────────────────────────────────
    let graphRangeHours = 0; // 0=전체
    let graphZoom = { scale: 1, offsetX: 0 };
    let graphDrag = { active: false, startX: 0, startOffset: 0, lastTouchDist: 0 };

    window.setGraphRange = (hrs) => {
      graphRangeHours = hrs;
      graphZoom = { scale: 1, offsetX: 0 };
      document.querySelectorAll(".graph-range-btn").forEach(b => b.classList.remove("active"));
      document.querySelector(`.graph-range-btn[data-hrs="${hrs}"]`)?.classList.add("active");
      renderPeptideGraph();
    };

    // ── 렌더링 ─────────────────────────────────────────
    function renderAll() {
      renderRemainingCards();
      renderPeptideList();
      renderPeptideGraph();
      renderWeightStats();
      renderWeightList();
      renderWeightGraph();
    }

    function renderRemainingCards() {
      const c = document.getElementById("remaining-cards");
      if (!c) return;
      c.innerHTML = Object.entries(DRUG_CONFIG).map(([drug, cfg]) => {
        const rem = calcRemaining(drug);
        return `
          <div class="card" style="border-color:${cfg.color}33">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <div style="font-size:12px;color:#9ca3af;margin-bottom:4px">${cfg.emoji} ${drug}</div>
                <div style="font-size:26px;font-weight:700;color:${cfg.color};font-family:'JetBrains Mono',monospace">${rem.toFixed(3)}<span style="font-size:13px;font-weight:400;margin-left:4px;color:#9ca3af">mg</span></div>
                <div style="font-size:11px;color:#4a5568;margin-top:3px">반감기 ${cfg.halfLifeDays}일</div>
              </div>
              <button onclick="openOverrideModal('${drug}')" style="background:#1f2937;border:1px solid #374151;border-radius:8px;color:#9ca3af;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit">수동입력</button>
            </div>
          </div>`;
      }).join("");
    }

    function renderPeptideList() {
      const filter = document.getElementById("peptide-filter")?.value || "전체";
      const c = document.getElementById("peptide-list");
      if (!c) return;
      let recs = (appData.records || []).filter(r => filter === "전체" || DRUG_CONFIG[r.drug]?.short === filter)
        .sort((a, b) => b.time - a.time);
      if (!recs.length) { c.innerHTML = `<div style="text-align:center;color:#4a5568;padding:32px 0;font-size:14px">기록이 없습니다</div>`; return; }
      c.innerHTML = recs.map(r => {
        const cfg = DRUG_CONFIG[r.drug] || {};
        return `<div class="record-row" style="border-color:${cfg.color}22">
          <div>
            <div style="font-size:12px;color:${cfg.color};margin-bottom:3px">${cfg.emoji||""} ${r.drug}${r.isOverride?' <span style="font-size:10px;color:#facc15">[수동]</span>':''}</div>
            <div style="font-size:17px;font-weight:700;color:#e2e8f0;font-family:'JetBrains Mono',monospace">${r.dose} mg</div>
            <div style="font-size:11px;color:#4a5568;margin-top:2px">${toKSTString(r.time)}</div>
          </div>
          <button class="del-btn" onclick="deleteRecord(${r.id})">삭제</button>
        </div>`;
      }).join("");
    }

    // ── 체내 농도 그래프 (터치 드래그 + 확대) ─────────
    function renderPeptideGraph() {
      const canvas = document.getElementById("peptide-chart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const W = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      const H = canvas.height = 240 * window.devicePixelRatio;
      canvas.style.height = "240px";
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      const cW = canvas.offsetWidth, cH = 240;
      ctx.clearRect(0, 0, cW, cH);

      const records = appData.records || [];
      if (!records.length) {
        ctx.fillStyle = "#4a5568"; ctx.font = "14px 'Noto Sans KR'"; ctx.textAlign = "center";
        ctx.fillText("기록이 없습니다", cW/2, cH/2); return;
      }

      const now = Date.now();
      let fullMinTime, fullMaxTime;
      if (graphRangeHours > 0) {
        fullMinTime = now - graphRangeHours * 3600000;
        fullMaxTime = now;
      } else {
        fullMinTime = Math.min(...records.map(r => r.time)) - 3600000;
        fullMaxTime = now + 3 * 86400000;
      }
      const fullRange = fullMaxTime - fullMinTime;

      // 줌/드래그 적용
      const visRange = fullRange / graphZoom.scale;
      const visMinTime = fullMinTime + graphZoom.offsetX;
      const visMaxTime = visMinTime + visRange;

      const PAD = { l: 48, r: 12, t: 28, b: 32 };
      const gW = cW - PAD.l - PAD.r;
      const gH = cH - PAD.t - PAD.b;

      const STEPS = 300;
      let globalMax = 0;
      const curves = Object.entries(DRUG_CONFIG).map(([drug, cfg]) => {
        const drugRecs = records.filter(r => r.drug === drug);
        if (!drugRecs.length) return null;
        const points = [];
        for (let i = 0; i <= STEPS; i++) {
          const t = visMinTime + (i / STEPS) * visRange;
          const val = calcConcentrationAt(drug, t);
          points.push({ t, val });
          if (val > globalMax) globalMax = val;
        }
        return { drug, cfg, points };
      }).filter(Boolean);

      if (globalMax === 0) globalMax = 1;

      // 배경
      ctx.fillStyle = "#0d0d1a";
      ctx.fillRect(PAD.l, PAD.t, gW, gH);

      // 가로 그리드
      ctx.strokeStyle = "#1f2937"; ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = PAD.t + gH - (i / 4) * gH;
        ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + gW, y); ctx.stroke();
        ctx.fillStyle = "#4a5568"; ctx.font = "10px 'JetBrains Mono'"; ctx.textAlign = "right";
        ctx.fillText((globalMax * i / 4).toFixed(2), PAD.l - 4, y + 4);
      }

      // x축 레이블 (범위에 따라 단위 자동)
      ctx.fillStyle = "#4a5568"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "center";
      const xLabelCount = 5;
      for (let i = 0; i <= xLabelCount; i++) {
        const t = visMinTime + (i / xLabelCount) * visRange;
        const x = PAD.l + (i / xLabelCount) * gW;
        const d = new Date(t);
        let label;
        if (visRange <= 2 * 3600000) label = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        else if (visRange <= 48 * 3600000) label = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}시`;
        else label = `${d.getMonth()+1}/${d.getDate()}`;
        ctx.fillText(label, x, cH - 4);
      }

      // 곡선 그리기
      curves.forEach(({ cfg, points }) => {
        // fill
        ctx.beginPath();
        points.forEach((p, i) => {
          const x = PAD.l + ((p.t - visMinTime) / visRange) * gW;
          const y = PAD.t + gH - (p.val / globalMax) * gH;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        const lastX = PAD.l + ((points[points.length-1].t - visMinTime) / visRange) * gW;
        ctx.lineTo(lastX, PAD.t + gH);
        ctx.lineTo(PAD.l, PAD.t + gH);
        ctx.closePath();
        ctx.fillStyle = cfg.color + "20"; ctx.fill();

        // line
        ctx.beginPath();
        ctx.strokeStyle = cfg.color; ctx.lineWidth = 2;
        ctx.shadowColor = cfg.color; ctx.shadowBlur = 6;
        points.forEach((p, i) => {
          const x = PAD.l + ((p.t - visMinTime) / visRange) * gW;
          const y = PAD.t + gH - (p.val / globalMax) * gH;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke(); ctx.shadowBlur = 0;
      });

      // 현재 시각 선
      const nowX = PAD.l + ((now - visMinTime) / visRange) * gW;
      if (nowX >= PAD.l && nowX <= PAD.l + gW) {
        ctx.strokeStyle = "#ffffff55"; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
        ctx.beginPath(); ctx.moveTo(nowX, PAD.t); ctx.lineTo(nowX, PAD.t + gH); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#ffffff88"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "center";
        ctx.fillText("현재", nowX, PAD.t + 10);
      }

      // 범례
      let lx = PAD.l + 4;
      curves.forEach(({ drug, cfg }) => {
        ctx.fillStyle = cfg.color; ctx.fillRect(lx, PAD.t - 14, 12, 3);
        ctx.fillStyle = "#9ca3af"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "left";
        ctx.fillText(cfg.short, lx + 14, PAD.t - 10);
        lx += 56;
      });

      // 터치 툴팁 그리기
      if (graphTooltip.visible) {
        const tx = graphTooltip.x;
        if (tx >= PAD.l && tx <= PAD.l + gW) {
          const t = visMinTime + ((tx - PAD.l) / gW) * visRange;
          ctx.strokeStyle = "#ffffff44"; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
          ctx.beginPath(); ctx.moveTo(tx, PAD.t); ctx.lineTo(tx, PAD.t + gH); ctx.stroke();
          ctx.setLineDash([]);

          const lines = [];
          const d = new Date(t);
          let timeLabel;
          if (visRange <= 2 * 3600000) timeLabel = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
          else timeLabel = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
          lines.push({ text: timeLabel, color: "#e2e8f0" });

          curves.forEach(({ drug, cfg }) => {
            const val = calcConcentrationAt(drug, t);
            if (val > 0.001) lines.push({ text: `${cfg.short}: ${val.toFixed(3)}mg`, color: cfg.color });
            // dot
            const y = PAD.t + gH - (val / globalMax) * gH;
            ctx.beginPath(); ctx.arc(tx, y, 4, 0, Math.PI*2);
            ctx.fillStyle = cfg.color; ctx.fill();
            ctx.strokeStyle = "#0a0a14"; ctx.lineWidth = 1.5; ctx.stroke();
          });

          // 툴팁 박스
          const bw = 130, bh = lines.length * 16 + 12;
          let bx = tx + 8, by = PAD.t + 8;
          if (bx + bw > cW - 4) bx = tx - bw - 8;
          ctx.fillStyle = "#1a1a2eee";
          ctx.strokeStyle = "#374151";
          ctx.lineWidth = 1;
          roundRect(ctx, bx, by, bw, bh, 6);
          ctx.fill(); ctx.stroke();
          lines.forEach((l, i) => {
            ctx.fillStyle = l.color; ctx.font = `${i===0?'11':'12'}px 'JetBrains Mono'`; ctx.textAlign = "left";
            ctx.fillText(l.text, bx + 8, by + 14 + i * 16);
          });
        }
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
      ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
      ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
      ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
      ctx.closePath();
    }

    // ── 그래프 툴팁/드래그/핀치줌 ─────────────────────
    let graphTooltip = { visible: false, x: 0 };

    function initGraphTouch() {
      const canvas = document.getElementById("peptide-chart");
      if (!canvas || canvas._touchInit) return;
      canvas._touchInit = true;

      const PAD_L = 48;
      let lastTouches = [];
      let isDragging = false;
      let dragStartX = 0;
      let dragStartOffset = 0;

      function getFullRange() {
        const now = Date.now();
        const records = appData.records || [];
        if (graphRangeHours > 0) return graphRangeHours * 3600000;
        if (!records.length) return 7 * 86400000;
        const minT = Math.min(...records.map(r => r.time)) - 3600000;
        return (now + 3 * 86400000) - minT;
      }

      canvas.addEventListener("touchstart", e => {
        e.preventDefault();
        lastTouches = Array.from(e.touches);
        if (e.touches.length === 1) {
          const rect = canvas.getBoundingClientRect();
          const x = e.touches[0].clientX - rect.left;
          isDragging = false;
          dragStartX = x;
          dragStartOffset = graphZoom.offsetX;
          // 짧은 탭 = 툴팁
          graphTooltip = { visible: true, x };
          renderPeptideGraph();
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();

        if (e.touches.length === 2) {
          // 핀치 줌
          graphTooltip.visible = false;
          const t1 = e.touches[0], t2 = e.touches[1];
          const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          if (lastTouches.length === 2) {
            const prevDist = Math.hypot(lastTouches[0].clientX - lastTouches[1].clientX, lastTouches[0].clientY - lastTouches[1].clientY);
            const ratio = prevDist / dist;
            const fullRange = getFullRange();
            const maxOffset = fullRange - fullRange / graphZoom.scale;
            const newScale = Math.min(50, Math.max(1, graphZoom.scale * (1 / ratio)));
            graphZoom.scale = newScale;
            graphZoom.offsetX = Math.max(0, Math.min(maxOffset, graphZoom.offsetX));
          }
          lastTouches = Array.from(e.touches);
          renderPeptideGraph();
        } else if (e.touches.length === 1) {
          const x = e.touches[0].clientX - rect.left;
          const dx = x - dragStartX;
          if (Math.abs(dx) > 5) {
            isDragging = true;
            graphTooltip.visible = false;
            // 드래그로 이동
            const fullRange = getFullRange();
            const visRange = fullRange / graphZoom.scale;
            const msPerPx = visRange / (canvas.offsetWidth - 48 - 12);
            graphZoom.offsetX = Math.max(0, Math.min(fullRange - visRange, dragStartOffset - dx * msPerPx));
          } else {
            graphTooltip = { visible: true, x };
          }
          renderPeptideGraph();
        }
      }, { passive: false });

      canvas.addEventListener("touchend", e => {
        lastTouches = Array.from(e.touches);
        if (!isDragging) {
          // 탭 종료 시 툴팁 유지
        }
      });

      // 마우스 드래그 (PC)
      let mouseDown = false;
      canvas.addEventListener("mousedown", e => {
        mouseDown = true; isDragging = false;
        dragStartX = e.offsetX; dragStartOffset = graphZoom.offsetX;
      });
      canvas.addEventListener("mousemove", e => {
        if (!mouseDown) {
          graphTooltip = { visible: true, x: e.offsetX };
        } else {
          const dx = e.offsetX - dragStartX;
          if (Math.abs(dx) > 3) {
            isDragging = true; graphTooltip.visible = false;
            const fullRange = getFullRange();
            const visRange = fullRange / graphZoom.scale;
            const msPerPx = visRange / (canvas.offsetWidth - 60);
            graphZoom.offsetX = Math.max(0, Math.min(fullRange - visRange, dragStartOffset - dx * msPerPx));
          }
        }
        renderPeptideGraph();
      });
      canvas.addEventListener("mouseup", () => { mouseDown = false; });
      canvas.addEventListener("mouseleave", () => { mouseDown = false; graphTooltip.visible = false; renderPeptideGraph(); });

      // 휠 줌 (PC)
      canvas.addEventListener("wheel", e => {
        e.preventDefault();
        const ratio = e.deltaY > 0 ? 1.2 : 0.8;
        graphZoom.scale = Math.min(50, Math.max(1, graphZoom.scale * ratio));
        renderPeptideGraph();
      }, { passive: false });
    }

    // ── 체중 그래프 ────────────────────────────────────
    function renderWeightGraph() {
      const canvas = document.getElementById("weight-chart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const W = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      const H = canvas.height = 200 * window.devicePixelRatio;
      canvas.style.height = "200px";
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      const cW = canvas.offsetWidth, cH = 200;
      ctx.clearRect(0, 0, cW, cH);

      const recs = (appData.weightRecords || []).sort((a, b) => a.time - b.time);
      if (recs.length < 2) {
        ctx.fillStyle = "#4a5568"; ctx.font = "14px 'Noto Sans KR'"; ctx.textAlign = "center";
        ctx.fillText(recs.length === 0 ? "기록이 없습니다" : "2개 이상 기록 필요", cW/2, cH/2); return;
      }

      const PAD = { l: 45, r: 15, t: 20, b: 32 };
      const gW = cW - PAD.l - PAD.r, gH = cH - PAD.t - PAD.b;
      const minT = recs[0].time, maxT = recs[recs.length-1].time;
      const weights = recs.map(r => r.weight);
      const minW = Math.min(...weights) - 1, maxW = Math.max(...weights) + 1;
      const rangeW = maxW - minW, rangeT = maxT - minT || 1;

      ctx.strokeStyle = "#1f2937"; ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = PAD.t + (i / 4) * gH;
        ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + gW, y); ctx.stroke();
        ctx.fillStyle = "#4a5568"; ctx.font = "10px 'JetBrains Mono'"; ctx.textAlign = "right";
        ctx.fillText((maxW - (i / 4) * rangeW).toFixed(1), PAD.l - 4, y + 4);
      }

      ctx.fillStyle = "#4a5568"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "center";
      [0, 0.25, 0.5, 0.75, 1].forEach(f => {
        const d = new Date(minT + f * rangeT);
        ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, PAD.l + f * gW, cH - 4);
      });

      if (appData.targetWeight) {
        const tw = parseFloat(appData.targetWeight);
        const ty = PAD.t + gH - ((tw - minW) / rangeW) * gH;
        if (ty >= PAD.t && ty <= PAD.t + gH) {
          ctx.strokeStyle = "#facc1566"; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(PAD.l, ty); ctx.lineTo(PAD.l + gW, ty); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#facc15"; ctx.font = "10px 'Noto Sans KR'"; ctx.textAlign = "left";
          ctx.fillText(`목표 ${tw}kg`, PAD.l + 4, ty - 4);
        }
      }

      const grad = ctx.createLinearGradient(0, PAD.t, 0, PAD.t + gH);
      grad.addColorStop(0, "#4ade8040"); grad.addColorStop(1, "#4ade8000");
      ctx.beginPath();
      recs.forEach((r, i) => {
        const x = PAD.l + ((r.time - minT) / rangeT) * gW;
        const y = PAD.t + gH - ((r.weight - minW) / rangeW) * gH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.lineTo(PAD.l + gW, PAD.t + gH); ctx.lineTo(PAD.l, PAD.t + gH);
      ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

      ctx.beginPath(); ctx.strokeStyle = "#4ade80"; ctx.lineWidth = 2.5;
      ctx.shadowColor = "#4ade80"; ctx.shadowBlur = 6;
      recs.forEach((r, i) => {
        const x = PAD.l + ((r.time - minT) / rangeT) * gW;
        const y = PAD.t + gH - ((r.weight - minW) / rangeW) * gH;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke(); ctx.shadowBlur = 0;

      recs.forEach(r => {
        const x = PAD.l + ((r.time - minT) / rangeT) * gW;
        const y = PAD.t + gH - ((r.weight - minW) / rangeW) * gH;
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
        ctx.fillStyle = "#4ade80"; ctx.fill();
        ctx.strokeStyle = "#0a0a14"; ctx.lineWidth = 2; ctx.stroke();
      });
    }

    function renderWeightStats() {
      const recs = (appData.weightRecords || []).sort((a, b) => b.time - a.time);
      const latest = recs[0];
      const h = parseFloat(appData.height) || 0;
      const target = parseFloat(appData.targetWeight) || 0;
      const el = id => document.getElementById(id);
      if (!el("stat-weight")) return;
      if (latest) {
        el("stat-weight").textContent = latest.weight + " kg";
        if (h) {
          const bmi = latest.weight / Math.pow(h/100, 2);
          const [[,label,color]] = [[18.5,"저체중","#60a5fa"],[23,"정상","#4ade80"],[25,"과체중","#facc15"],[30,"비만","#f97316"],[999,"고도비만","#ef4444"]].filter(([v])=>bmi<v);
          el("stat-bmi").textContent = bmi.toFixed(1)+" "+label;
          el("stat-bmi").style.color = color;
        }
        if (target) {
          const diff = latest.weight - target;
          el("stat-target").textContent = diff <= 0 ? "🎉 목표 달성!" : `${diff.toFixed(1)} kg 남음`;
          el("stat-target").style.color = diff <= 0 ? "#4ade80" : "#facc15";
        }
      } else { el("stat-weight").textContent = "-- kg"; el("stat-bmi").textContent = "--"; el("stat-target").textContent = "--"; }
      if (el("s-height")) el("s-height").value = appData.height || "";
      if (el("s-target")) el("s-target").value = appData.targetWeight || "";
      document.querySelectorAll(".gender-btn").forEach(b => b.classList.toggle("active", b.dataset.v === appData.gender));
    }

    function renderWeightList() {
      const c = document.getElementById("weight-list");
      if (!c) return;
      const recs = (appData.weightRecords || []).sort((a,b) => b.time - a.time);
      if (!recs.length) { c.innerHTML = `<div style="text-align:center;color:#4a5568;padding:32px 0;font-size:14px">기록이 없습니다</div>`; return; }
      c.innerHTML = recs.map(r => `
        <div class="record-row" style="border-color:#4ade8022">
          <div>
            <div style="font-size:20px;font-weight:700;color:#4ade80;font-family:'JetBrains Mono',monospace">${r.weight} kg</div>
            <div style="font-size:11px;color:#4a5568;margin-top:2px">${toKSTString(r.time)}</div>
          </div>
          <button class="del-btn" onclick="deleteWeightRecord(${r.id})">삭제</button>
        </div>`).join("");
    }

    // ── 모달 헬퍼 ──────────────────────────────────────
    window.openAddModal = () => {
      document.getElementById("add-time").value = kstNow();
      document.getElementById("add-dose").value = "";
      document.getElementById("add-modal").style.display = "flex";
    };
    window.closeAddModal = () => document.getElementById("add-modal").style.display = "none";
    window.openWeightModal = () => {
      document.getElementById("add-weight-time").value = kstNow();
      document.getElementById("add-weight").value = "";
      document.getElementById("weight-modal").style.display = "flex";
    };
    window.closeWeightModal = () => document.getElementById("weight-modal").style.display = "none";

    window.calcPeptide = () => {
      const vial = parseFloat(document.getElementById("c-vial").value);
      const water = parseFloat(document.getElementById("c-water").value);
      const dose = parseFloat(document.getElementById("c-dose").value);
      if (!vial||!water||!dose) return;
      const conc = (vial * 1000) / water;
      const volume = dose / conc;
      const units = volume * 100;
      const injPerVial = (vial * 1000) / dose;
      document.getElementById("calc-result").innerHTML = `
        <div class="result-card">
          <div class="result-row"><span>농도</span><span>${conc.toFixed(0)} mcg/ml</span></div>
          <div class="result-row"><span>1회 투여량</span><span>${(volume*1000).toFixed(0)} μL</span></div>
          <div class="result-row"><span>인슐린 단위</span><span>${units.toFixed(1)} U</span></div>
          <div class="result-row" style="border:none"><span>바이알당 횟수</span><span>${injPerVial.toFixed(0)}회</span></div>
        </div>`;
    };

    window.switchTab = (tab) => {
      document.querySelectorAll(".tab-panel").forEach(p => p.style.display = "none");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("panel-"+tab).style.display = "block";
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
      if (tab === "peptide") { setTimeout(() => { renderPeptideGraph(); initGraphTouch(); }, 50); }
      if (tab === "weight") setTimeout(renderWeightGraph, 50);
    };

    window.setGender = (g) => {
      appData.gender = g;
      document.querySelectorAll(".gender-btn").forEach(b => b.classList.toggle("active", b.dataset.v === g));
    };

    window.setQuickVal = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.value = val;
    };

    window.onFilterChange = renderPeptideList;

    window.addEventListener("resize", () => { renderPeptideGraph(); renderWeightGraph(); });

    // 초기화 후 그래프 터치 이벤트 등록
    window.addEventListener("load", () => setTimeout(initGraphTouch, 500));
  </script>

      <div class="filter-bar">

        <input type="hidden" id="peptide-filter" value="전체" />
      </div>
      <div id="peptide-list"></div>
    </div>

    <!-- ── 계산기 패널 ── -->
    <div id="panel-calc" class="tab-panel">
      <div class="card" style="margin-bottom:12px">
        <div class="section-title">바이알 용량 (mg)</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="setQuickVal('c-vial','10')">10</button>
          <button class="qbtn" onclick="setQuickVal('c-vial','30')">30</button>
          <button class="qbtn" onclick="setQuickVal('c-vial','60')">60</button>
        </div>
        <input id="c-vial" class="input-field" type="number" placeholder="직접 입력" />
      </div>
      <div class="card" style="margin-bottom:12px">
        <div class="section-title">BAC Water (ml)</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="setQuickVal('c-water','1.8')">1.8</button>
          <button class="qbtn" onclick="setQuickVal('c-water','2.4')">2.4</button>
          <button class="qbtn" onclick="setQuickVal('c-water','3.0')">3.0</button>
        </div>
        <input id="c-water" class="input-field" type="number" placeholder="직접 입력" />
      </div>
      <div class="card" style="margin-bottom:12px">
        <div class="section-title">1회 투여량 (mcg)</div>
        <div class="quick-btns">
          <button class="qbtn" onclick="setQuickVal('c-dose','250')">250</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','500')">500</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','1000')">1000</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','2000')">2000</button>
          <button class="qbtn" onclick="setQuickVal('c-dose','4000')">4000</button>
        </div>
        <input id="c-dose" class="input-field" type="number" placeholder="직접 입력" />
      </div>
      <button class="big-btn blue" onclick="calcPeptide()" style="margin-bottom:14px">계산하기</button>
      <div id="calc-result"></div>
    </div>

    <!-- ── 체중 패널 ── -->
    <div id="panel-weight" class="tab-panel">
      <div class="card" style="margin-bottom:12px">
        <div class="section-title">기본 설정</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="gender-btn active" data-v="남성" onclick="setGender('남성')">남성</button>
          <button class="gender-btn" data-v="여성" onclick="setGender('여성')">여성</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div><label>키 (cm)</label><input id="s-height" class="input-field" type="number" placeholder="170" /></div>
          <div><label>목표 체중 (kg)</label><input id="s-target" class="input-field" type="number" placeholder="65" /></div>
        </div>
        <button class="big-btn green" onclick="saveSettings()">설정 저장</button>
      </div>

      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">현재 체중</div><div class="stat-val" id="stat-weight">-- kg</div></div>
        <div class="stat-card"><div class="stat-label">BMI</div><div class="stat-val" id="stat-bmi">--</div></div>
        <div class="stat-card" style="grid-column:1/-1"><div class="stat-label">목표까지</div><div class="stat-val" id="stat-target">--</div></div>
      </div>

      <div class="chart-wrap">
        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">📉 체중 변화 추이</div>
        <canvas id="weight-chart"></canvas>
      </div>

      <button class="big-btn green" onclick="openWeightModal()" style="margin-bottom:14px">+ 체중 기록 추가</button>
      <div id="weight-list"></div>
    </div>

  </div>
</div>

<!-- ══ 모달: 투약 추가 ══ -->
<div id="add-modal" class="modal-overlay" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-title">💉 투약 기록 추가</div>
    <div style="margin-bottom:12px"><label>약물</label>
      <select id="add-drug" class="input-field">
        <option>터제파타이드</option><option>레타트루타이드</option><option>세마글루타이드</option>
      </select>
    </div>
    <div style="margin-bottom:12px"><label>용량 (mg)</label>
      <input id="add-dose" class="input-field" type="number" step="0.1" placeholder="예: 2.5" />
    </div>
    <div style="margin-bottom:12px"><label>날짜 / 시간 (한국시간)</label>
      <input id="add-time" class="input-field" type="datetime-local" />
    </div>
    <div class="modal-actions">
      <button class="big-btn" style="background:#374151;flex:1" onclick="closeAddModal()">취소</button>
      <button class="big-btn blue" style="flex:2" onclick="submitAddRecord()">저장</button>
    </div>
  </div>
</div>

<!-- ══ 모달: 수동 농도 입력 ══ -->
<div id="override-modal" class="modal-overlay" onclick="if(event.target===this)document.getElementById('override-modal').style.display='none'">
  <div class="modal-box">
    <div class="modal-title" id="override-title">⚗️ 체내 농도 수동 입력</div>
    <div style="margin-bottom:12px"><label>현재 체내 잔여량 (mg)</label>
      <input id="override-amount" class="input-field" type="number" step="0.001" placeholder="예: 3.500" />
    </div>
    <div style="margin-bottom:12px"><label>기준 시각 (한국시간)</label>
      <input id="override-time" class="input-field" type="datetime-local" />
    </div>
    <div style="font-size:11px;color:#4a5568;margin-bottom:4px">💡 입력한 양을 입력한 시각에 투약한 것으로 기록해요</div>
    <div class="modal-actions">
      <button class="big-btn" style="background:#374151;flex:1" onclick="document.getElementById('override-modal').style.display='none'">취소</button>
      <button class="big-btn blue" style="flex:2" onclick="submitOverride()">저장</button>
    </div>
  </div>
</div>

<!-- ══ 모달: 체중 추가 ══ -->
<div id="weight-modal" class="modal-overlay" onclick="if(event.target===this)closeWeightModal()">
  <div class="modal-box">
    <div class="modal-title">⚖️ 체중 기록 추가</div>
    <div style="margin-bottom:12px"><label>체중 (kg)</label>
      <input id="add-weight" class="input-field" type="number" step="0.1" placeholder="예: 72.5" />
    </div>
    <div style="margin-bottom:12px"><label>날짜 / 시간 (한국시간)</label>
      <input id="add-weight-time" class="input-field" type="datetime-local" />
    </div>
    <div class="modal-actions">
      <button class="big-btn" style="background:#374151;flex:1" onclick="closeWeightModal()">취소</button>
      <button class="big-btn green" style="flex:2" onclick="submitAddWeight()">저장</button>
    </div>
  </div>
</div>

</body>
</html>
